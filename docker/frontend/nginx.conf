# ========================================================================
# nginx Configuration - Discord Visual Room Frontend
# ========================================================================
#
# This nginx configuration is optimized for serving a Single Page
# Application (SPA) built with Vite/Three.js.
#
# Key Features:
# - SPA routing: All routes fallback to index.html
# - Gzip compression for faster transfers
# - Cache headers for static assets
# - Security headers
# - WebSocket upgrade support (for future features)
#
# ========================================================================

user appuser;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # Logging Format
    # ------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ========================================================================
    # Performance Optimizations
    # ------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ========================================================================
    # Security Headers
    # ------------------------------------------------------------------------
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ========================================================================
    # Virtual Host Configuration
    # ------------------------------------------------------------------------
    server {
        listen 8001;
        server_name _;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # ====================================================================
        # Static Asset Caching
        # ====================================================================
        # Cache JS/CSS files with hash in filename (Vite does this)
        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ====================================================================
        # Service Worker (if added later)
        # ====================================================================
        location = /sw.js {
            expires 0;
            add_header Cache-Control "no-cache";
            add_header Cache-Control "public";
        }

        # ====================================================================
        # HTML files - No caching
        # ====================================================================
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # ====================================================================
        # Health Check Endpoint
        # ====================================================================
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ====================================================================
        # SPA Routing Fallback
        # ====================================================================
        # For all other requests, serve index.html
        # This allows the frontend router to handle the route
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # ====================================================================
        # Error Pages
        # ====================================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # ====================================================================
        # Deny access to hidden files
        # ====================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}

