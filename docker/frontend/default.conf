# ========================================================================
# nginx Server Block Configuration - Discord Visual Room
# ========================================================================
#
# This is the default server block configuration for serving the
# Discord Visual Room frontend application.
#
# This file is included from the main nginx.conf and configures
# the virtual host for the application.
#
# ========================================================================

server {
    listen 80;
    server_name _;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Character set
    charset utf-8;

    # ====================================================================
    # Asset Caching Strategy
    # ====================================================================
    #
    # Vite builds assets with content-based hashes in filenames
    # (e.g., app-abc123.js). These can be cached indefinitely.
    #
    # Files without hashes (index.html, entry points) should not be cached
    # to ensure users always get the latest version.
    #
    # ====================================================================

    # Cache static assets with hashes (Vite output)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker (if added) - needs to update frequently
    location = /sw.js {
        expires 0;
        add_header Cache-Control "no-cache, public";
    }

    # HTML files - no caching to ensure updates are picked up
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ====================================================================
    # API Proxy (Optional - for future use)
    # ====================================================================
    # If you need to proxy API requests to the backend, uncomment and
    # configure the location block below:
    #
    # location /api/ {
    #     proxy_pass http://backend:8080/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # ====================================================================
    # Health Check Endpoint
    # ====================================================================
    # Used by Docker health checks and load balancers
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ====================================================================
    # SPA Fallback
    # ====================================================================
    # For client-side routing, all non-file requests should serve index.html
    # This allows the frontend router to handle the route.
    #
    # Try the file first, then the directory, then fall back to index.html
    #
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ====================================================================
    # Security: Deny Access to Hidden Files
    # ====================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ====================================================================
    # Error Pages
    # ====================================================================
    # For SPA, redirect errors back to index.html
    error_page 404 /index.html;

    # For server errors, show a simple error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ====================================================================
    # WebSocket Support (for future features)
    # ====================================================================
    # If you need WebSocket support, uncomment the following:
    #
    # location /ws {
    #     proxy_pass http://backend:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_read_timeout 86400;
    # }
}

