# Test configuration for Discord Visual Room Backend

discord-visual-room {
  # Discord configuration (use test tokens)
  discord {
    token = "test-token-12345"
    voice-channel-id = "test-voice-channel-123"
    guild-id = "test-guild-456"
  }

  # LLM configuration for testing
  llm {
    base-url = "http://localhost:1234"
    timeout-ms = 1000  # Short timeout for tests
    max-retries = 1
  }

  # WebSocket configuration for testing
  websocket {
    host = "localhost"
    port = 8080  # Use different port for tests
    path = "/ws"
  }

  # Room configuration for testing
  room {
    id = "test-room-1"
    name = "Test Room"
    dimensions {
      width = 10.0
      height = 3.0
      depth = 10.0
    }
    max-users = 10
  }

  # Test-specific settings
  test {
    mock-llm = true  # Use mock LLM responses
    use-fast-timeouts = true
  }
}

# Akka configuration for testing
akka {
  loglevel = "WARNING"
  actor {
    provider = "local"
    debug {
      # Enable for debugging test failures
      receive = off
      lifecycle = off
    }
  }

  # Use a smaller dispatcher for tests
  test {
    timefactor = 1.0  # Speed up time-based tests
  }
}
