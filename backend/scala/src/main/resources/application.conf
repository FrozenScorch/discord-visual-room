# Discord Visual Room - Base Configuration
# This file contains the base configuration that is loaded first
# Environment-specific configurations are loaded from application-{env}.conf

# Discord Bot Configuration
discord {
  # Bot token from Discord Developer Portal
  # Falls back to environment variable DISCORD_BOT_TOKEN
  bot-token = ${DISCORD_BOT_TOKEN}

  # Guild (server) ID to monitor
  guild-id = ${DISCORD_GUILD_ID}

  # Voice channel ID to visualize
  voice-channel-id = ${DISCORD_VOICE_CHANNEL_ID}

  # Connection settings
  connection {
    # Initial connection delay in milliseconds
    initial-delay = 2s

    # Reconnection settings
    max-retries = 5
    retry-delay = 5s
  }
}

# LLM Service Configuration
llm {
  # URL of the llama.cpp server
  server-url = ${LLM_SERVER_URL}

  # Request timeout
  timeout = ${LLM_TIMEOUT_MS}ms

  # Maximum retry attempts
  max-retries = ${LLM_MAX_RETRIES}

  # Enable fallback to linear layout on failure
  fallback-enabled = ${LLM_FALLBACK_ENABLED}

  # LLM request settings
  request {
    # Temperature for LLM responses (0.0 - 1.0)
    temperature = 0.7

    # Maximum tokens in response
    max-tokens = 1000

    # Model name (if using llama.cpp API)
    model = "default"
  }

  # Validation settings
  validation {
    # Strict mode: reject any furniture not in whitelist
    strict-mode = true

    # Valid furniture types (must match frontend assets)
    valid-furniture-types = [
      "COMPUTER_DESK"
      "COUCH_2_SEATER"
      "COUCH_SINGLE"
      "BAR_STOOL"
    ]
  }
}

# WebSocket Server Configuration
websocket {
  # Host to bind to
  host = ${BACKEND_HOST}

  # Port for WebSocket connections
  port = ${BACKEND_WS_PORT}

  # WebSocket frame handler settings
  frame-handler {
    # Maximum frame size in bytes
    max-frame-size = 256m

    # Ping interval (0 = disabled)
    ping-interval = 30s

    # Ping timeout
    ping-timeout = 10s
  }
}

# Room Configuration
room {
  # Maximum users allowed in room
  max-users = ${ROOM_MAX_USERS}

  # Room dimensions in 3D space
  dimensions {
    width = ${ROOM_DIMENSIONS_WIDTH}
    height = ${ROOM_DIMENSIONS_HEIGHT}
    depth = ${ROOM_DIMENSIONS_DEPTH}
  }

  # Furniture placement settings
  furniture {
    # Spawn furniture based on user count (elastic)
    elastic-spawning = true

    # Buffer zones around furniture
    buffer-zone = 2.0

    # Minimum distance between furniture items
    min-spacing = 3.0
  }
}

# Actor System Configuration
akka {
  actor {
    # Actor system name
    provider = "local"

    # Default dispatcher configuration
    default-dispatcher {
      type = Dispatcher
      executor = "thread-pool-executor"
      thread-pool-executor {
        fixed-pool-size = 16
      }
      throughput = 5
    }
  }

  # HTTP server for WebSocket
  http {
    server {
      idle-timeout = 60s
      request-timeout = 20s
      bind-timeout = 5s
    }

    websocket {
      periodic-keep-alive-max-idle = 10s
    }
  }
}

# Logging Configuration
logging {
  # Log level (ERROR, WARNING, INFO, DEBUG)
  level = ${LOG_LEVEL}

  # Console logging
  console {
    enabled = true
    format = "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
  }

  # File logging (optional)
  file {
    enabled = false
    path = "logs/discord-visual-room.log"
    max-size = 10m
    max-backups = 5
  }
}

# Feature Flags
features {
  # Enable LLM-based layout generation
  enable-llm = ${ENABLE_LLM}

  # Debug mode (verbose logging, relaxed validation)
  debug-mode = ${DEBUG_MODE}

  # Enable performance metrics
  enable-metrics = ${ENABLE_METRICS}

  # Hot reload (development only)
  hot-reload = ${HOT_RELOAD}
}

# Metrics Configuration (if enabled)
metrics {
  # Metrics collection interval
  collection-interval = 60s

  # Metrics to track
  track {
    # LLM request latency
    llm-latency = true

    # WebSocket message rates
    message-rate = true

    # User join/leave events
    user-events = true

    # Actor system health
    actor-health = true
  }
}
