# Discord Visual Room - Production Environment
# Load this configuration with: -Dconfig.resource=application-prod.conf

# Override base configuration for production
include "application.conf"

# Production Discord settings
discord {
  bot-token = ${DISCORD_BOT_TOKEN}
  guild-id = ${DISCORD_GUILD_ID}
  voice-channel-id = ${DISCORD_VOICE_CHANNEL_ID}

  connection {
    initial-delay = 2s
    max-retries = 5
    retry-delay = 5s
  }
}

# Production LLM settings (optimized)
llm {
  server-url = "http://192.168.68.62:1234"
  timeout = 5s
  max-retries = 1
  fallback-enabled = true

  request {
    temperature = 0.7
    max-tokens = 1000
  }

  validation {
    # In production, strict validation
    strict-mode = true
  }
}

# Production WebSocket (all interfaces)
websocket {
  host = "0.0.0.0"
  port = 8080

  frame-handler {
    max-frame-size = 256m
    ping-interval = 30s
    ping-timeout = 10s
  }
}

# Production room (full capacity)
room {
  max-users = 20

  dimensions {
    width = 50
    height = 10
    depth = 50
  }

  furniture {
    elastic-spawning = true
    buffer-zone = 2.0
    min-spacing = 3.0
  }
}

# Production actor system (optimized for load)
akka {
  actor {
    default-dispatcher {
      type = Dispatcher
      executor = "thread-pool-executor"
      thread-pool-executor {
        fixed-pool-size = 16
      }
      throughput = 5
    }
  }

  # Production HTTP settings
  http {
    server {
      idle-timeout = 60s
      request-timeout = 20s
      bind-timeout = 5s
      # Max connections
      max-connections = 100
    }
  }
}

# Production logging (warnings and errors only)
logging {
  level = "WARNING"

  console {
    enabled = true
    format = "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
  }

  file {
    enabled = true
    path = "/var/log/discord-visual-room/production.log"
    max-size = 100m
    max-backups = 10
  }
}

# Production features (stable only)
features {
  enable-llm = true
  debug-mode = false
  enable-metrics = true
  hot-reload = false
}

# Production metrics (minimal overhead)
metrics {
  collection-interval = 60s

  track {
    llm-latency = true
    message-rate = true
    user-events = true
    actor-health = true
  }
}
