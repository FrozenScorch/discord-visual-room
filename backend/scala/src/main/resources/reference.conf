# Discord Visual Room - Reference Configuration
# This file contains all default values and documentation
# Loaded first, then overridden by application.conf and environment-specific configs

# ========================================
# Discord Bot Configuration
# ========================================
discord {
  # Bot token from Discord Developer Portal
  # REQUIRED: Set via DISCORD_BOT_TOKEN environment variable
  # Get token from: https://discord.com/developers/applications
  bot-token = null

  # Guild (server) ID to monitor
  # REQUIRED: Set via DISCORD_GUILD_ID environment variable
  guild-id = null

  # Voice channel ID to visualize
  # REQUIRED: Set via DISCORD_VOICE_CHANNEL_ID environment variable
  voice-channel-id = null

  # Discord connection settings
  connection {
    # Delay before initial connection attempt
    # Format: duration (e.g., 2s, 500ms)
    initial-delay = 2s

    # Maximum number of reconnection attempts
    max-retries = 5

    # Delay between reconnection attempts
    retry-delay = 5s
  }
}

# ========================================
# LLM Service Configuration
# ========================================
llm {
  # URL of the llama.cpp server
  # Default: http://192.168.68.62:1234 (local development server)
  # Override with LLM_SERVER_URL environment variable
  server-url = "http://192.168.68.62:1234"

  # Request timeout
  # Format: duration (e.g., 5s, 5000ms)
  # Override with LLM_TIMEOUT_MS environment variable (milliseconds)
  timeout = 5s

  # Maximum number of retry attempts for failed requests
  # Override with LLM_MAX_RETRIES environment variable
  max-retries = 1

  # Enable fallback to linear layout on LLM failure
  # When true: Uses generateLinearLayout() on LLM errors
  # When false: Fails fast and returns error
  # Override with LLM_FALLBACK_ENABLED environment variable
  fallback-enabled = true

  # LLM request parameters
  request {
    # Temperature for response randomness
    # Range: 0.0 (deterministic) to 1.0 (creative)
    temperature = 0.7

    # Maximum tokens in LLM response
    max-tokens = 1000

    # Model name (for llama.cpp API)
    model = "default"
  }

  # LLM response validation
  validation {
    # Strict mode: Reject any furniture not in whitelist
    # true: Only allow valid-furniture-types
    # false: Allow with warnings (development)
    strict-mode = true

    # Whitelist of valid furniture types
    # MUST match frontend's 3D mesh assets exactly
    valid-furniture-types = [
      "COMPUTER_DESK"    # For competitive gaming
      "COUCH_2_SEATER"   # For casual co-op games
      "COUCH_SINGLE"     # For solo/AFK users
      "BAR_STOOL"        # For mobile/handheld games
    ]
  }
}

# ========================================
# WebSocket Server Configuration
# ========================================
websocket {
  # Host address to bind WebSocket server
  # localhost: Only accept local connections (development)
  # 0.0.0.0: Accept connections from any interface (production)
  # Override with BACKEND_HOST environment variable
  host = "0.0.0.0"

  # Port for WebSocket connections
  # Override with BACKEND_WS_PORT environment variable
  port = 8080

  # WebSocket frame handler settings
  frame-handler {
    # Maximum frame size (prevents memory issues)
    # Format: size (e.g., 256m, 128k)
    max-frame-size = 256m

    # Ping interval for connection health checks
    # 0s: Disabled
    ping-interval = 30s

    # Timeout before considering connection dead
    ping-timeout = 10s
  }
}

# ========================================
# Room Configuration
# ========================================
room {
  # Maximum number of users allowed in the room
  # Override with ROOM_MAX_USERS environment variable
  max-users = 20

  # 3D room dimensions
  dimensions {
    # Width (x-axis) in 3D units
    # Override with ROOM_DIMENSIONS_WIDTH environment variable
    width = 50

    # Height (y-axis) in 3D units
    # Override with ROOM_DIMENSIONS_HEIGHT environment variable
    height = 10

    # Depth (z-axis) in 3D units
    # Override with ROOM_DIMENSIONS_DEPTH environment variable
    depth = 50
  }

  # Furniture placement settings
  furniture {
    # Elastic spawning: Spawn furniture based on active user count
    # true: Furniture appears/disappears as users join/leave
    # false: Fixed furniture count
    elastic-spawning = true

    # Buffer zone around each furniture item
    # Space to prevent furniture from overlapping
    buffer-zone = 2.0

    # Minimum spacing between furniture items
    min-spacing = 3.0
  }
}

# ========================================
# Akka Actor System Configuration
# ========================================
akka {
  # Actor system provider
  provider = "local"

  # Default dispatcher for actors
  actor {
    default-dispatcher {
      type = Dispatcher
      executor = "thread-pool-executor"
      thread-pool-executor {
        # Number of threads in pool
        # Development: 4 threads
        # Production: 16 threads
        fixed-pool-size = 16
      }
      # Number of messages per actor before switching
      throughput = 5
    }
  }

  # HTTP server (for WebSocket)
  http {
    server {
      # Maximum time a connection can be idle
      idle-timeout = 60s

      # Maximum time for request processing
      request-timeout = 20s

      # Maximum time to bind to port
      bind-timeout = 5s
    }

    websocket {
      # Keep-alive interval for WebSocket connections
      periodic-keep-alive-max-idle = 10s
    }
  }
}

# ========================================
# Logging Configuration
# ========================================
logging {
  # Log level
  # Options: ERROR, WARNING, INFO, DEBUG
  # Override with LOG_LEVEL environment variable
  level = "INFO"

  # Console logging
  console {
    # Enable console output
    enabled = true

    # Log format pattern
    # %d: datetime, %level: log level, %logger: logger name, %msg: message
    format = "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
  }

  # File logging (optional)
  file {
    # Enable file logging
    enabled = false

    # Log file path
    path = "logs/discord-visual-room.log"

    # Maximum file size before rotation
    max-size = 10m

    # Number of backup files to keep
    max-backups = 5
  }
}

# ========================================
# Feature Flags
# ========================================
features {
  # Enable LLM-based layout generation
  # false: Always use linear layout fallback
  # Override with ENABLE_LLM environment variable
  enable-llm = true

  # Debug mode (verbose logging, relaxed validation)
  # Override with DEBUG_MODE environment variable
  debug-mode = false

  # Enable performance metrics collection
  # Override with ENABLE_METRICS environment variable
  enable-metrics = true

  # Hot reload (development only)
  # When true: Watch for file changes and reload
  # Override with HOT_RELOAD environment variable
  hot-reload = false
}

# ========================================
# Metrics Configuration
# ========================================
metrics {
  # Interval for collecting metrics
  # Format: duration (e.g., 60s, 1m)
  collection-interval = 60s

  # Metrics to track
  track {
    # LLM request/response latency
    llm-latency = true

    # WebSocket message rates (messages/second)
    message-rate = true

    # User join/leave events
    user-events = true

    # Actor system health checks
    actor-health = true
  }
}
