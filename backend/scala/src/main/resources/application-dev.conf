# Discord Visual Room - Development Environment
# Load this configuration with: -Dconfig.resource=application-dev.conf

# Override base configuration for development
include "application.conf"

# Development Discord settings (use test server)
discord {
  bot-token = ${DISCORD_BOT_TOKEN}
  guild-id = ${DISCORD_GUILD_ID}
  voice-channel-id = ${DISCORD_VOICE_CHANNEL_ID}

  connection {
    initial-delay = 1s
    max-retries = 10
    retry-delay = 2s
  }
}

# Development LLM settings (more lenient)
llm {
  server-url = "http://192.168.68.62:1234"
  timeout = 10s
  max-retries = 2
  fallback-enabled = true

  request {
    temperature = 0.5
    max-tokens = 2000
  }

  validation {
    # In development, show warnings but don't fail
    strict-mode = false
  }
}

# Development WebSocket (localhost only)
websocket {
  host = "localhost"
  port = 8080

  frame-handler {
    max-frame-size = 256m
    ping-interval = 15s
    ping-timeout = 5s
  }
}

# Development room (smaller for testing)
room {
  max-users = 10

  dimensions {
    width = 30
    height = 10
    depth = 30
  }

  furniture {
    elastic-spawning = true
    buffer-zone = 1.5
    min-spacing = 2.0
  }
}

# Development actor system (smaller thread pool)
akka {
  actor {
    default-dispatcher {
      type = Dispatcher
      executor = "thread-pool-executor"
      thread-pool-executor {
        fixed-pool-size = 4
      }
      throughput = 5
    }
  }
}

# Development logging (verbose)
logging {
  level = "DEBUG"

  console {
    enabled = true
    # Colored output for development
    format = "%highlight{%d{yyyy-MM-dd HH:mm:ss} [%level]} %logger{36} - %msg%n"
  }

  file {
    enabled = true
    path = "logs/dev.log"
  }
}

# Development features (all enabled)
features {
  enable-llm = true
  debug-mode = true
  enable-metrics = true
  hot-reload = true
}

# Development metrics (more frequent)
metrics {
  collection-interval = 10s

  track {
    llm-latency = true
    message-rate = true
    user-events = true
    actor-health = true
  }
}
