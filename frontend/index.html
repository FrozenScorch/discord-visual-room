<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discord Visual Room - 3D visualization of Discord voice channels">
  <title>Discord Visual Room</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <!-- Main canvas container (full viewport) -->
  <main>
    <div id="canvas-container"></div>
  </main>

  <!-- Minimal top bar - fades after connection -->
  <div id="top-bar" class="top-bar">
    <div class="room-title">Discord Visual Room</div>
    <div id="connection-status" class="status-dot connecting">
      <span class="dot"></span>
      <span class="status-text">Connecting...</span>
    </div>
  </div>

  <!-- User count badge (bottom-left) -->
  <div id="user-count" class="user-count">
    <span class="user-count-icon">&#x1F464;</span>
    <span id="user-count-number">0</span>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Entering room...</p>
  </div>

  <!-- Main application script -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
