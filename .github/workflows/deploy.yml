name: Production Deployment

# Manual trigger only - requires approval
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version tag (optional)'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: false
        type: boolean

# Environment-specific configuration
env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  SERVER_HOST: 192.168.68.56
  SERVER_USER: frozenscorch
  SERVER_PATH: ~/discord-visual-room

jobs:
  # Pre-deployment checks and validation
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.checks.outputs.should_deploy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check branch protection
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Warning: Deploying from non-main branch"
          fi

      - name: Verify tests passed
        if: ${{ inputs.skip_tests != true }}
        run: |
          echo "Verifying latest CI run passed..."
          # GitHub CLI check for CI status
          gh run list --branch=main --workflow=ci.yml --limit=1 --json conclusion --jq '.[0].conclusion' | grep -q "success" || {
            echo "Error: Latest CI run did not pass"
            exit 1
          }

      - name: Validate environment variables
        run: |
          # Check required secrets are set
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Error: SSH_PRIVATE_KEY secret not set"
            exit 1
          fi

      - name: Output deployment decision
        id: checks
        run: echo "should_deploy=true" >> $GITHUB_OUTPUT

  # Build and push Docker images
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: pre-deploy

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [frontend, backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx for multi-platform builds and caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for Docker (labels, tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push Docker image with layer caching
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMPONENT=${{ matrix.component }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # Image vulnerability scan
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}:latest
          format: 'sarif'
          output: 'trivy-results-${{ matrix.component }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.component }}.sarif'

  # Deploy to production server
  deploy-to-server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-images]
    environment:
      name: ${{ inputs.environment }}
      url: http://${{ env.SERVER_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup SSH for server deployment
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Create deployment script on server
      - name: Deploy to server via SSH
        run: |
          # Deploy frontend image
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
          set -e

          echo "Starting deployment..."
          cd ${{ env.SERVER_PATH }}

          # Create backup of current running containers
          echo "Backing up current containers..."
          docker-compose -f docker-compose.prod.yml ps || true

          # Pull latest images
          echo "Pulling latest images..."
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest

          # Stop running containers
          echo "Stopping running containers..."
          docker-compose -f docker-compose.prod.yml down || true

          # Update docker-compose.yml with new image tags
          export IMAGE_TAG_FRONTEND=${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest
          export IMAGE_TAG_BACKEND=${{ env.REGISTRY }}/${{ github.repository }}-backend:latest
          export DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
          export LLM_SERVER_URL=http://192.168.68.62:1234

          # Start new containers
          echo "Starting new containers..."
          docker-compose -f docker-compose.prod.yml up -d

          # Wait for health checks
          echo "Waiting for health checks..."
          sleep 30

          # Check container status
          docker-compose -f docker-compose.prod.yml ps

          # Verify containers are running
          if ! docker-compose -f docker-compose.prod.yml ps | grep -q "Up"; then
            echo "Error: Containers failed to start"
            docker-compose -f docker-compose.prod.yml logs
            exit 1
          fi

          echo "Deployment successful!"

          ENDSSH

      # Verify deployment health
      - name: Verify deployment health
        run: |
          echo "Checking service health..."
          sleep 10

          # Check if frontend is accessible
          curl -f http://${{ env.SERVER_HOST }}:8080/health || {
            echo "Frontend health check failed"
            exit 1
          }

          # Check if backend WebSocket is accessible
          curl -f http://${{ env.SERVER_HOST }}:8081/health || {
            echo "Backend health check failed"
            exit 1
          }

          echo "All health checks passed!"

      # Run smoke tests on deployed application
      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."

          # Test frontend endpoint
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_HOST }}:8080/)
          if [ "$FRONTEND_STATUS" != "200" ]; then
            echo "Frontend smoke test failed (HTTP $FRONTEND_STATUS)"
            exit 1
          fi

          # Test backend WebSocket endpoint
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_HOST }}:8081/ws)
          if [ "$BACKEND_STATUS" != "426" ]; then
            # 426 Upgrade Required is expected for WebSocket without upgrade headers
            echo "Backend smoke test failed (HTTP $BACKEND_STATUS)"
            exit 1
          fi

          echo "Smoke tests passed!"

      # Get container logs for verification
      - name: Fetch container logs
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
          cd ${{ env.SERVER_PATH }}
          echo "=== Frontend Logs ==="
          docker-compose -f docker-compose.prod.yml logs frontend
          echo "=== Backend Logs ==="
          docker-compose -f docker-compose.prod.yml logs backend
          ENDSSH

      # Cleanup SSH key
      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # Rollback deployment on failure
  rollback:
    name: Rollback (on failure)
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-images, deploy-to-server]
    if: failure()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
          set -e
          cd ${{ env.SERVER_PATH }}

          echo "Rolling back deployment..."
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d

          echo "Rollback complete"
          ENDSSH

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # Deployment notification
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [pre-deploy, build-images, deploy-to-server]
    if: always()

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy-to-server.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=:white_check_mark: Deployment successful!" >> $GITHUB_OUTPUT
            echo "color=28a745" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=:x: Deployment failed!" >> $GITHUB_OUTPUT
            echo "color=dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ inputs.version || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.status.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ env.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest" >> $GITHUB_STEP_SUMMARY

      # Optional: Send Discord notification
      - name: Send Discord notification
        if: vars.DISCORD_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ vars.DISCORD_WEBHOOK_URL }}
          payload: |
            {
              "text": "${{ steps.status.outputs.message }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.message }}\n*Environment:* ${{ inputs.environment }}\n*Version:* ${{ inputs.version || 'latest' }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        continue-on-error: true
