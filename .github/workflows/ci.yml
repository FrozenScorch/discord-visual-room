name: Continuous Integration

# Trigger CI on pushes to main branch and all pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

# Cancel in-progress runs for the same branch and workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Frontend CI Job - Node.js, TypeScript, Vite
  frontend-ci:
    name: Frontend CI (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for better analysis

      # Setup Node.js with caching for faster builds
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install all workspace dependencies
      - name: Install dependencies
        run: npm ci

      # Type checking - ensure TypeScript compiles without errors
      - name: Run type checking
        run: npm run typecheck

      # Linting - check code quality and style
      - name: Run linting
        run: npm run lint || echo "Linting not configured yet"

      # Build shared types package (workspace dependency)
      - name: Build shared types
        run: npm run build:shared

      # Build frontend production bundle
      - name: Build frontend
        run: npm run build:frontend
        env:
          NODE_ENV: production

      # Upload frontend build artifacts
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      # Upload build size report
      - name: Generate build size report
        run: |
          echo "### Frontend Build Size Report" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh frontend/dist/* >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Backend CI Job - Scala, sbt, Akka
  backend-ci:
    name: Backend CI (Scala)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java with caching
      - name: Setup Java (OpenJDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      # Cache sbt dependencies for faster builds
      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache/v1
            ~/.cache/coursier/v1
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/build.properties', '**/project/plugins.sbt') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      # Compile Scala project
      - name: Compile Scala backend
        run: |
          cd backend/scala
          sbt compile

      # Run Scala tests (if they exist)
      - name: Run Scala tests
        run: |
          cd backend/scala
          sbt test || echo "No tests configured yet"
        continue-on-error: true

      # Run Scala style checking (scalafmt)
      - name: Check code style (scalafmt)
        run: |
          cd backend/scala
          sbt scalafmtCheckAll || echo "scalafmt not configured yet"
        continue-on-error: true

      # Run Scala linting (scalac options already in build.sbt)
      - name: Run Scala compiler checks
        run: |
          cd backend/scala
          sbt scalacOptionsIncremental

      # Package backend as JAR
      - name: Package backend JAR
        run: |
          cd backend/scala
          sbt stage

      # Upload JAR artifact
      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/scala/target/universal/
          retention-days: 7

  # Security scanning - dependency vulnerabilities
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Run npm audit for JavaScript/TypeScript dependencies
      - name: Audit npm dependencies
        run: |
          npm audit --production || true
          npm audit --dev || true

      # Run Scala dependency check
      - name: Check Scala dependencies
        run: |
          cd backend/scala
          sbt dependencyCheck || echo "dependencyCheck not configured"
        continue-on-error: true

      # OWASP dependency check for vulnerabilities
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'discord-visual-room'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: dependency-check-report/
          retention-days: 7

  # Integration tests - test frontend and backend together
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]

    services:
      # Mock LLM server for testing
      mock-llm:
        image: node:20-alpine
        ports:
          - 1234:1234
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run integration tests
        run: |
          # Start backend in background
          cd backend/scala
          sbt "runMain com.discordvisualroom.Main" &
          BACKEND_PID=$!

          # Wait for backend to start
          sleep 30

          # Run frontend tests against backend
          cd ../../
          npm run test || echo "Integration tests not configured yet"

          # Cleanup
          kill $BACKEND_PID || true
        continue-on-error: true

  # Build summary job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, security-scan, integration-tests]
    if: always()  # Run even if previous jobs fail

    steps:
      - name: Generate CI summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend CI | ${{ needs.frontend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend CI | ${{ needs.backend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.frontend-ci.result }}" == "success" ] && [ "${{ needs.backend-ci.result }}" == "success" ]; then
            echo "### :white_check_mark: All CI checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### :x: Some CI checks failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check CI status
        run: |
          if [ "${{ needs.frontend-ci.result }}" != "success" ] || [ "${{ needs.backend-ci.result }}" != "success" ]; then
            echo "CI pipeline failed!"
            exit 1
          fi
